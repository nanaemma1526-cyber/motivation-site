<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test – Category Cards</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { background: #0a0f2a; color: #f5c542; font-family: sans-serif; padding: 20px; }
        .cards-grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .card { background: #1e2a3a; padding: 20px; border-radius: 12px; cursor: pointer; }
        .quotes-screen { margin-top: 20px; }
        .post { background: #1e2a3a; margin-bottom: 10px; padding: 10px; border-left: 4px solid gold; }
    </style>
</head>
<body>
<div id="menuScreen">
    <div class="cards-grid">
        <div class="card" data-category="birthday">🎂 Birthday</div>
        <div class="card" data-category="motivational">💪 Motivational</div>
        <div class="card" data-category="proverbs">🌍 African Proverbs</div>
        <div class="card" data-category="biblical">📖 Biblical</div>
    </div>
</div>
<div id="quotesScreen" style="display:none;">
    <button id="backBtn">← Back</button>
    <h2 id="categoryTitle"></h2>
    <div id="quotesContainer"></div>
</div>

<script>
    const CSV_LINKS = {
        birthday: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSobQavQFqfcKBScUtaU2jFC4voRiudfc5nIsqGgo5v6ozEfhYT4MC4r_UYIcXYLR8XBw12nonnNKsI/pub?output=csv",
        motivational: "https://docs.google.com/spreadsheets/d/e/2PACX-1vT1ONrAo95j-RHUpXVoFqHfs-q2hE2hZAlsF2i69gKmhvUanDh20hFCRGw55M59bqiDXZ1ilV-AyTna/pub?output=csv",
        proverbs: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTgXScNF1wk8MxWahiFRf_mBStqYB4mLd1LKRcY16zL86BZbYu-RpzLxGNoTU5MOynQrwMj7elSiouH/pub?output=csv",
        biblical: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRCwGKC4wGBtjHr0YtflDsJf9yyywQHGTqFxrFv12mDnw6S9T85jBkaYn20SL1BMJO2pQiEjPR9rX8C/pub?output=csv"
    };
    const menu = document.getElementById('menuScreen');
    const quotesScreen = document.getElementById('quotesScreen');
    const quotesContainer = document.getElementById('quotesContainer');
    const categoryTitle = document.getElementById('categoryTitle');

    document.querySelectorAll('.card').forEach(card => {
        card.onclick = () => {
            const category = card.getAttribute('data-category');
            categoryTitle.innerText = category;
            menu.style.display = 'none';
            quotesScreen.style.display = 'block';
            loadQuotes(category);
        };
    });
    document.getElementById('backBtn').onclick = () => {
        menu.style.display = 'block';
        quotesScreen.style.display = 'none';
        quotesContainer.innerHTML = '';
    };

    async function loadQuotes(category) {
        quotesContainer.innerHTML = 'Loading...';
        const url = CSV_LINKS[category];
        try {
            const res = await fetch(url);
            const csv = await res.text();
            const parsed = Papa.parse(csv, { header: true });
            const rows = parsed.data;
            let html = '';
            for (let row of rows) {
                let quote = row['Today\'s motivational/inspirational quotes'] || row['Quote'] || row[Object.keys(row)[1]];
                if (quote) html += <div class="post">“${quote}”</div>;
            }
            quotesContainer.innerHTML = html || 'No quotes.';
        } catch (err) {
            quotesContainer.innerHTML = 'Error loading.';
        }
    }
</script>
</body>
</html>
